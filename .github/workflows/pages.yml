name: Deploy tobiifree-demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - run: nix develop --command bash -c "just bundle"

      - run: nix develop --command bash -c "npm install"

      - run: nix develop --command bash -c "cd applications/tobiifree-demo && npx vite build --base /${{ github.event.repository.name }}/"
        env:
          NODE_ENV: production

      - uses: actions/upload-pages-artifact@v3
        with:
          path: applications/tobiifree-demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
